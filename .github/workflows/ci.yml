name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Syntax-check daemon
        run: python -m py_compile python/daemon.py
      - name: Install pyalarmdotcomajax
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python/requirements.txt
      - name: Confirm import
        run: python -c "import pyalarmdotcomajax; print('pyalarmdotcomajax', getattr(pyalarmdotcomajax, '__version__', '?'))"
